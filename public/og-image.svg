<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#e8e8e6" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#fafafa"/>

  <!-- Subtle grid -->
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.5"/>

  <!-- Left: Book cover area -->
  <g transform="translate(80, 65)">
    <!-- Book shadow -->
    <rect x="6" y="6" width="300" height="500" rx="4" fill="#d6d3d2" opacity="0.4"/>

    <!-- Book cover -->
    <rect x="0" y="0" width="300" height="500" rx="4" fill="#fefefe" stroke="#d6d3d2" stroke-width="1"/>

    <!-- Inner border -->
    <rect x="12" y="12" width="276" height="476" fill="none" stroke="#2d3748" stroke-width="1"/>

    <!-- Cover title -->
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="700" fill="#1e293b" letter-spacing="2">
      <tspan x="30" y="60" font-size="22">THE AGENTIC</tspan>
      <tspan x="30" y="88" font-size="22">ENGINEERING</tspan>
      <tspan x="30" y="116" font-size="22">GUIDE</tspan>
    </text>

    <!-- Cover illustration area (abstract agent figures) -->
    <rect x="24" y="140" width="252" height="260" fill="none" stroke="#2d3748" stroke-width="0.8"/>

    <!-- Simplified agent figures -->
    <g fill="none" stroke="#2d3748" stroke-linecap="round" stroke-linejoin="round">
      <!-- Row 1 -->
      <g opacity="0.35">
        <circle cx="70" cy="190" r="5" stroke-width="0.8"/>
        <line x1="70" y1="195" x2="70" y2="208" stroke-width="0.8"/>
        <line x1="70" y1="200" x2="64" y2="205" stroke-width="0.8"/>
        <line x1="70" y1="200" x2="76" y2="205" stroke-width="0.8"/>
        <line x1="70" y1="208" x2="64" y2="216" stroke-width="0.8"/>
        <line x1="70" y1="208" x2="76" y2="216" stroke-width="0.8"/>
      </g>
      <g opacity="0.2">
        <circle cx="120" cy="195" r="4.5" stroke-width="0.7"/>
        <line x1="120" y1="199.5" x2="120" y2="211" stroke-width="0.7"/>
        <line x1="120" y1="204" x2="115" y2="208" stroke-width="0.7"/>
        <line x1="120" y1="204" x2="125" y2="208" stroke-width="0.7"/>
        <line x1="120" y1="211" x2="115" y2="218" stroke-width="0.7"/>
        <line x1="120" y1="211" x2="125" y2="218" stroke-width="0.7"/>
      </g>
      <g opacity="0.45">
        <circle cx="170" cy="188" r="5.5" stroke-width="0.8"/>
        <line x1="170" y1="193.5" x2="170" y2="207" stroke-width="0.8"/>
        <line x1="170" y1="198" x2="164" y2="203" stroke-width="0.8"/>
        <line x1="170" y1="198" x2="176" y2="203" stroke-width="0.8"/>
        <line x1="170" y1="207" x2="164" y2="215" stroke-width="0.8"/>
        <line x1="170" y1="207" x2="176" y2="215" stroke-width="0.8"/>
      </g>
      <g opacity="0.3">
        <circle cx="220" cy="192" r="4" stroke-width="0.7"/>
        <line x1="220" y1="196" x2="220" y2="207" stroke-width="0.7"/>
        <line x1="220" y1="200" x2="215" y2="204" stroke-width="0.7"/>
        <line x1="220" y1="200" x2="225" y2="204" stroke-width="0.7"/>
        <line x1="220" y1="207" x2="215" y2="214" stroke-width="0.7"/>
        <line x1="220" y1="207" x2="225" y2="214" stroke-width="0.7"/>
      </g>

      <!-- Connection lines between figures -->
      <line x1="76" y1="200" x2="115" y2="204" stroke-width="0.3" opacity="0.15" stroke-dasharray="2,3"/>
      <line x1="125" y1="204" x2="164" y2="198" stroke-width="0.3" opacity="0.15" stroke-dasharray="2,3"/>
      <line x1="176" y1="198" x2="215" y2="200" stroke-width="0.3" opacity="0.15" stroke-dasharray="2,3"/>

      <!-- Row 2 -->
      <g opacity="0.25">
        <circle cx="95" cy="260" r="5" stroke-width="0.7"/>
        <line x1="95" y1="265" x2="95" y2="278" stroke-width="0.7"/>
        <line x1="95" y1="270" x2="89" y2="275" stroke-width="0.7"/>
        <line x1="95" y1="270" x2="101" y2="275" stroke-width="0.7"/>
        <line x1="95" y1="278" x2="89" y2="286" stroke-width="0.7"/>
        <line x1="95" y1="278" x2="101" y2="286" stroke-width="0.7"/>
      </g>
      <g opacity="0.4">
        <circle cx="150" cy="255" r="5.5" stroke-width="0.8"/>
        <line x1="150" y1="260.5" x2="150" y2="275" stroke-width="0.8"/>
        <line x1="150" y1="265" x2="144" y2="270" stroke-width="0.8"/>
        <line x1="150" y1="265" x2="156" y2="270" stroke-width="0.8"/>
        <line x1="150" y1="275" x2="144" y2="283" stroke-width="0.8"/>
        <line x1="150" y1="275" x2="156" y2="283" stroke-width="0.8"/>
      </g>
      <g opacity="0.2">
        <circle cx="205" cy="262" r="4.5" stroke-width="0.7"/>
        <line x1="205" y1="266.5" x2="205" y2="278" stroke-width="0.7"/>
        <line x1="205" y1="271" x2="200" y2="275" stroke-width="0.7"/>
        <line x1="205" y1="271" x2="210" y2="275" stroke-width="0.7"/>
        <line x1="205" y1="278" x2="200" y2="285" stroke-width="0.7"/>
        <line x1="205" y1="278" x2="210" y2="285" stroke-width="0.7"/>
      </g>

      <!-- More connection lines -->
      <line x1="101" y1="270" x2="144" y2="265" stroke-width="0.3" opacity="0.15" stroke-dasharray="2,3"/>
      <line x1="156" y1="265" x2="200" y2="271" stroke-width="0.3" opacity="0.15" stroke-dasharray="2,3"/>

      <!-- Vertical connections -->
      <line x1="70" y1="216" x2="95" y2="260" stroke-width="0.3" opacity="0.1" stroke-dasharray="2,3"/>
      <line x1="170" y1="215" x2="150" y2="255" stroke-width="0.3" opacity="0.1" stroke-dasharray="2,3"/>
      <line x1="220" y1="214" x2="205" y2="262" stroke-width="0.3" opacity="0.1" stroke-dasharray="2,3"/>

      <!-- Row 3 - sparse -->
      <g opacity="0.15">
        <circle cx="130" cy="330" r="4" stroke-width="0.7"/>
        <line x1="130" y1="334" x2="130" y2="345" stroke-width="0.7"/>
        <line x1="130" y1="338" x2="125" y2="342" stroke-width="0.7"/>
        <line x1="130" y1="338" x2="135" y2="342" stroke-width="0.7"/>
        <line x1="130" y1="345" x2="125" y2="352" stroke-width="0.7"/>
        <line x1="130" y1="345" x2="135" y2="352" stroke-width="0.7"/>
      </g>
      <g opacity="0.3">
        <circle cx="180" cy="325" r="5" stroke-width="0.7"/>
        <line x1="180" y1="330" x2="180" y2="343" stroke-width="0.7"/>
        <line x1="180" y1="335" x2="174" y2="340" stroke-width="0.7"/>
        <line x1="180" y1="335" x2="186" y2="340" stroke-width="0.7"/>
        <line x1="180" y1="343" x2="174" y2="351" stroke-width="0.7"/>
        <line x1="180" y1="343" x2="186" y2="351" stroke-width="0.7"/>
      </g>

      <line x1="95" y1="286" x2="130" y2="330" stroke-width="0.3" opacity="0.1" stroke-dasharray="2,3"/>
      <line x1="150" y1="283" x2="180" y2="325" stroke-width="0.3" opacity="0.1" stroke-dasharray="2,3"/>
    </g>

    <!-- Cover subtitle -->
    <text x="30" y="430" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="400" fill="#64748b" letter-spacing="0.5">
      <tspan x="30" y="430">Concepts, workflows, and team practices</tspan>
      <tspan x="30" y="444">for AI agent infrastructure</tspan>
    </text>

    <!-- Cover separator -->
    <line x1="30" y1="460" x2="270" y2="460" stroke="#d6d3d2" stroke-width="0.5"/>

    <!-- Cover author -->
    <text x="30" y="480" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#1e293b" letter-spacing="1.5">SIDDHANT KHARE</text>
  </g>

  <!-- Right: Text content -->
  <g transform="translate(480, 120)">
    <!-- Monospace label -->
    <text font-family="ui-monospace, monospace" font-size="12" font-weight="400" fill="#8a8380" letter-spacing="3">
      <tspan x="0" y="0">/BOOK</tspan>
    </text>

    <!-- Title -->
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="600" fill="#1a1a1a" letter-spacing="-0.5">
      <tspan x="0" y="55" font-size="42">The Agentic</tspan>
      <tspan x="0" y="102" font-size="42">Engineering Guide</tspan>
    </text>

    <!-- Subtitle -->
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="16" fill="#5c5855" letter-spacing="0.2">
      <tspan x="0" y="145">Concepts, workflows, and team practices</tspan>
      <tspan x="0" y="167">for AI agent infrastructure.</tspan>
    </text>

    <!-- Separator -->
    <line x1="0" y1="195" x2="580" y2="195" stroke="#e8e8e6" stroke-width="1"/>

    <!-- Stats -->
    <text font-family="ui-monospace, monospace" font-size="13" fill="#8a8380" letter-spacing="0.5">
      <tspan x="0" y="225">10 Parts</tspan>
      <tspan x="100" y="225" fill="#d6d3d2">|</tspan>
      <tspan x="120" y="225">33 Chapters</tspan>
      <tspan x="250" y="225" fill="#d6d3d2">|</tspan>
      <tspan x="270" y="225">4 Appendices</tspan>
    </text>

    <!-- Author -->
    <text font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#5c5855">
      <tspan x="0" y="280">Siddhant Khare</tspan>
    </text>
    <text font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#8a8380">
      <tspan x="0" y="300">Software Engineer at Ona  |  OpenFGA Maintainer (CNCF)</tspan>
    </text>

    <!-- URL -->
    <text font-family="ui-monospace, monospace" font-size="12" fill="#8a8380" letter-spacing="0.5">
      <tspan x="0" y="370">siddhant-k-code.github.io/agentic-engineering-guide</tspan>
    </text>
  </g>

  <!-- Bottom border accent -->
  <rect x="0" y="626" width="1200" height="4" fill="#1a1a1a"/>
</svg>
